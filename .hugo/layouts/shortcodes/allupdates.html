<div style="overflow-x:auto;">
<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Release</th>
	  <th>Status</th>
      <th>Update Version</th>
      <th>Git Tag</th>
    </tr>
  </thead>
  <tbody>
  {{- range ( partial "allupdates" ) }}
  <tr>
    <td>{{ .date }}</td>
    <td><a href="../jdk/{{ .release.version }}/">{{ .release.name }}</a></td>
    <td>{{ with .release.status }}<span class="tag status-{{ . }}" title="{{ index hugo.Data.jdk.status . }}" style="cursor: help">{{ . }}</span>{{ end }}</td>
    <td>{{ .version }}</td>
    <td><a href="{{ .giturl }}/releases/tag/{{ .tag }}">{{ .tag }}</a></td>
  </tr>
  {{- end }}
  </tbody>
</table>
</div>
